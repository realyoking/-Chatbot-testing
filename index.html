<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Voice - Puter Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; touch-action: manipulation; }
        .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; backdrop-filter: blur(10px); }
        #wave-container { display: flex; align-items: center; justify-content: center; gap: 4px; height: 50px; }
        .bar { width: 4px; height: 20%; background: #00ff41; border-radius: 2px; transition: 0.1s; }
        #mainBtn { -webkit-tap-highlight-color: transparent; }
        .pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 overflow-hidden">

    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-xs tracking-[0.5em] uppercase text-gray-500 mb-2">Neural Link Active</h1>
            <div id="wave-container">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl mb-10 min-h-[160px] flex flex-col justify-center">
            <div id="live-text" class="text-white text-xl text-center italic leading-tight">
                Tap the button and say something...
            </div>
        </div>

        <button id="mainBtn" onclick="handleBtn()" class="w-full py-12 rounded-[40px] border-2 border-[#00ff41] text-[#00ff41] font-bold text-2xl transition-all active:scale-95 shadow-lg">
            START
        </button>

        <div class="mt-8 text-center">
            <span id="status" class="text-[10px] bg-gray-900 px-3 py-1 rounded-full text-gray-400 uppercase tracking-widest">
                System: Standby
            </span>
        </div>
    </div>

    <script>
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        const liveText = document.getElementById('live-text');
        const mainBtn = document.getElementById('mainBtn');
        const bars = document.querySelectorAll('.bar');
        const status = document.getElementById('status');

        // 1. Visualizer Logic (Shows you if mic is working)
        async function startVisualizer(stream) {
            const context = new AudioContext();
            const source = context.createMediaStreamSource(stream);
            const analyser = context.createAnalyser();
            analyser.fftSize = 32;
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);

            function update() {
                if(!isRecording) { bars.forEach(b => b.style.height = "20%"); return; }
                analyser.getByteFrequencyData(data);
                bars.forEach((bar, i) => {
                    bar.style.height = Math.max(20, (data[i] / 255) * 100) + "%";
                });
                requestAnimationFrame(update);
            }
            update();
        }

        // 2. Main Button Handler
        async function handleBtn() {
            if (!isRecording) {
                // START RECORDING
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    startVisualizer(stream);
                    
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = processAudio;
                    
                    mediaRecorder.start();
                    isRecording = true;
                    
                    mainBtn.innerText = "DONE";
                    mainBtn.style.borderColor = "#ff4141";
                    mainBtn.style.color = "#ff4141";
                    mainBtn.classList.add('pulse');
                    liveText.innerText = "Listening...";
                    status.innerText = "Status: Recording";
                    
                } catch (e) {
                    alert("Mic Error: Please allow camera/mic access in iPad settings.");
                }
            } else {
                // STOP RECORDING
                isRecording = false;
                mediaRecorder.stop();
                mainBtn.innerText = "THINKING...";
                mainBtn.disabled = true;
                mainBtn.classList.remove('pulse');
                status.innerText = "Status: Transcribing";
            }
        }

        // 3. Process with Puter.js (The Keyless Public API)
        async function processAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            
            try {
                // USE PUTER.JS FOR SPEECH TO TEXT (FREE & NO KEY)
                const result = await puter.ai.speech2txt(audioBlob);
                const transcript = result.text || "I didn't catch that.";
                liveText.innerHTML = `<span class="text-gray-400 text-sm italic">You said:</span><br>${transcript}`;

                // Simple AI Logic (using Puter's chat since it's already connected)
                status.innerText = "Status: AI Thinking";
                const aiResponse = await puter.ai.chat(`Give a very short, witty 1-sentence reply to: ${transcript}`);
                
                liveText.innerHTML += `<br><br><span class="text-[#00ff41]">${aiResponse}</span>`;
                
                // Speak response
                const utter = new SpeechSynthesisUtterance(aiResponse);
                window.speechSynthesis.speak(utter);

            } catch (err) {
                liveText.innerText = "Connection failed. Please check your internet.";
                console.error(err);
            } finally {
                mainBtn.disabled = false;
                mainBtn.innerText = "START";
                mainBtn.style.borderColor = "#00ff41";
                mainBtn.style.color = "#00ff41";
                status.innerText = "Status: Ready";
            }
        }
    </script>
</body>
</html>
