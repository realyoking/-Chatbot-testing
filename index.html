<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 3 Web AI</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .model-btn { background: #334155; border: 1px solid #475569; color: white; padding: 15px; width: 100%; margin: 10px 0; border-radius: 10px; cursor: pointer; text-align: left; }
        .model-btn:hover { background: #3b82f6; }
        #loader { display: none; text-align: center; margin: 20px 0; }
        .progress-bg { background: #0f172a; border-radius: 5px; height: 10px; width: 100%; overflow: hidden; margin-top: 10px; }
        #progress-fill { background: #3b82f6; height: 100%; width: 0%; transition: width 0.2s; }
        #chat { display: none; }
        #output { background: #000; height: 200px; overflow-y: auto; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        input { width: 75%; padding: 10px; border-radius: 5px; border: none; }
        button#send-btn { width: 20%; padding: 10px; background: #3b82f6; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup">
        <h2>Select AI Model</h2>
        <button class="model-btn" onclick="start('onnx-community/gemma-3-270m-it-W8A16')">
            <b>Gemma 3 270M</b><br><small>Fastest load (~150MB)</small>
        </button>
        <button class="model-btn" onclick="start('onnx-community/gemma-3-1b-it-ONNX-GQA')">
            <b>Gemma 3 1B</b><br><small>Smartest choice (~650MB)</small>
        </button>
    </div>

    <div id="loader">
        <h3 id="status-msg">Downloading Brain...</h3>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <p id="percent">0%</p>
    </div>

    <div id="chat">
        <div id="output">System: Ready.</div>
        <input type="text" id="user-input" placeholder="Type here...">
        <button id="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script type="module">
    // Direct link to the 2026 stable library
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

    // IMPORTANT: Fixes for GitHub Pages environment
    env.allowRemoteModels = true;
    env.proxies.HUGGINGFACE_CO_RESOLVE_ENDPOINT = 'https://huggingface.co';

    let pipe;

    window.start = async (modelId) => {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            pipe = await pipeline('text-generation', modelId, {
                device: 'webgpu', // Uses GPU
                dtype: 'q4',      // Uses the tiny 4-bit version
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        document.getElementById('progress-fill').style.width = p.progress + '%';
                        document.getElementById('percent').innerText = Math.round(p.progress) + '%';
                    }
                }
            });
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
        } catch (e) {
            console.error(e);
            document.getElementById('status-msg').innerText = "WebGPU Error. Refreshing with CPU...";
            // Auto-retry with CPU if GPU fails
            location.reload(); 
        }
    };

    window.send = async () => {
        const input = document.getElementById('user-input');
        const output = document.getElementById('output');
        const text = input.value;
        if(!text) return;

        output.innerHTML += `<br><b>You:</b> ${text}<br><b>AI:</b> Thinking...`;
        input.value = '';

        const result = await pipe(text, { max_new_tokens: 50 });
        const reply = result[0].generated_text.replace(text, '');
        output.innerHTML = output.innerHTML.replace('Thinking...', reply);
    };
</script>

</body>
</html>
