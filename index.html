<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Voice - Public API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.WebRTC-Experiment.com/RecordRTC.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; }
        .box { border: 1px solid #222; background: #000; border-radius: 20px; }
        .btn-active { background: #ff1111; color: white; border: none; box-shadow: 0 0 20px rgba(255,17,17,0.4); }
        .loading-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm">
        <div class="mb-4 flex justify-between items-center px-2">
            <span class="text-[10px] uppercase tracking-widest text-gray-500">Public STT Bridge</span>
            <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-800"></div>
        </div>

        <div class="box p-6 mb-8 min-h-[120px] shadow-2xl">
            <div id="user-text" class="text-white text-lg mb-4">Tap to begin...</div>
            <div id="ai-text" class="text-green-500 text-sm italic"></div>
        </div>

        <button id="mainBtn" onclick="toggleRecord()" class="w-full py-12 rounded-[40px] border-2 border-[#00ff41] font-bold text-xl transition-all active:scale-95">
            START RECORDING
        </button>
        
        <p class="mt-6 text-[9px] text-center text-gray-600 uppercase">Uses OpenAI Whisper via Public Inference</p>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        let recorder;
        let isRecording = false;
        let generator;
        const userText = document.getElementById('user-text');
        const aiText = document.getElementById('ai-text');
        const mainBtn = document.getElementById('mainBtn');
        const dot = document.getElementById('status-dot');

        // Load the "brain" (TTS/Logic)
        (async () => {
            userText.innerText = "Initializing Engine...";
            generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M');
            userText.innerText = "Ready. Tap button.";
            dot.style.background = "#00ff41";
        })();

        window.toggleRecord = async () => {
            if (!isRecording) {
                // START
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    recorder = new RecordRTC(stream, { type: 'audio', mimeType: 'audio/webm' });
                    recorder.startRecording();
                    
                    isRecording = true;
                    mainBtn.innerText = "TAP TO FINISH";
                    mainBtn.classList.add('btn-active');
                    userText.innerText = "Listening...";
                    userText.classList.add('loading-pulse');
                } catch(e) { alert("Please allow Mic access!"); }
            } else {
                // STOP
                isRecording = false;
                mainBtn.innerText = "TRANSCRIBING...";
                mainBtn.disabled = true;
                userText.classList.remove('loading-pulse');
                
                recorder.stopRecording(async () => {
                    let blob = recorder.getBlob();
                    await transcribePublic(blob);
                });
            }
        };

        async function transcribePublic(audioBlob) {
            userText.innerText = "Processing audio...";
            
            try {
                // Sending to a Public Hugging Face Whisper API (No Key Required for small usage)
                const response = await fetch("https://api-inference.huggingface.co/models/openai/whisper-tiny.en", {
                    method: "POST",
                    body: audioBlob,
                });
                
                const result = await response.json();
                const spokenText = result.text || "I couldn't hear anything.";
                userText.innerText = "You: " + spokenText;

                // AI Response
                if(spokenText.length > 2) {
                    const output = await generator(spokenText, { max_new_tokens: 50 });
                    const reply = output[0].generated_text;
                    aiText.innerText = "AI: " + reply;
                    
                    const utter = new SpeechSynthesisUtterance(reply);
                    window.speechSynthesis.speak(utter);
                }

            } catch (e) {
                userText.innerText = "API Busy. Try again in a moment.";
            } finally {
                mainBtn.disabled = false;
                mainBtn.innerText = "START RECORDING";
                mainBtn.classList.remove('btn-active');
            }
        }
    </script>
</body>
</html>
