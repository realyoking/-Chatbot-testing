<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad AI - Force Listen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0b; color: #00ff41; font-family: monospace; touch-action: manipulation; }
        .btn-ready { border: 3px solid #00ff41; color: #00ff41; }
        .btn-active { border: 3px solid #ff4141; color: #ff4141; background: rgba(255,65,65,0.1); }
        #preview { min-height: 80px; border-radius: 15px; background: #1a1a1c; border: 1px solid #333; }
        .pulse { animation: p 1.5s infinite; }
        @keyframes p { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="loader" class="w-full max-w-sm text-center">
        <div class="mb-4 text-xs tracking-widest uppercase">Initializing Local Engine...</div>
        <div class="h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="bar" class="h-full bg-green-500 w-0 transition-all"></div>
        </div>
    </div>

    <div id="app" class="hidden w-full max-w-sm">
        <div id="preview" class="p-6 mb-8 text-white text-lg italic flex items-center justify-center text-center">
            Tap button to speak...
        </div>

        <button id="mainBtn" onclick="handleTap()" class="w-full py-10 rounded-[40px] font-bold text-2xl btn-ready transition-all active:scale-95">
            START TALKING
        </button>

        <div class="mt-10 flex justify-between text-[10px] uppercase text-gray-500 tracking-tighter">
            <div>Mic: <span id="micStatus" class="text-gray-700">OFF</span></div>
            <div>AI: <span id="aiStatus">STANDBY</span></div>
        </div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        const bar = document.getElementById('bar');
        const preview = document.getElementById('preview');
        const mainBtn = document.getElementById('mainBtn');
        const micStatus = document.getElementById('micStatus');
        
        let generator;
        let recognition;
        let isActive = false;
        let textResult = "";

        // 1. Setup AI
        async function setup() {
            try {
                generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M', {
                    progress_callback: (p) => { if(p.status==='progress') bar.style.width = p.progress + "%"; }
                });
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                setupSpeech();
            } catch (e) { alert("Load Error: " + e.message); }
        }

        // 2. Setup Speech (iPad optimized)
        function setupSpeech() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) textResult += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                preview.innerText = interim || textResult;
                micStatus.innerText = "HEARING SOUND";
                micStatus.className = "text-green-500 font-bold";
            };

            recognition.onerror = (e) => {
                if(e.error === 'no-speech') return;
                micStatus.innerText = "ERR: " + e.error;
                micStatus.className = "text-red-500";
            };
        }

        // 3. Handle Taps
        window.handleTap = async () => {
            if (!isActive) {
                // START
                isActive = true;
                textResult = "";
                preview.innerText = "Speak now...";
                preview.classList.add('pulse');
                mainBtn.innerText = "STOP & SEND";
                mainBtn.className = "w-full py-10 rounded-[40px] font-bold text-2xl btn-active";
                window.speechSynthesis.cancel();
                recognition.start();
            } else {
                // STOP
                isActive = false;
                recognition.stop();
                preview.classList.remove('pulse');
                mainBtn.innerText = "THINKING...";
                mainBtn.disabled = true;

                // Wait a tiny bit for the final transcript to catch up
                setTimeout(async () => {
                    const finalInput = preview.innerText.trim();
                    if (finalInput.length > 1 && finalInput !== "Speak now...") {
                        const output = await generator(finalInput, { max_new_tokens: 50 });
                        const aiMsg = output[0].generated_text;
                        preview.innerText = aiMsg;
                        
                        const utter = new SpeechSynthesisUtterance(aiMsg);
                        window.speechSynthesis.speak(utter);
                    } else {
                        preview.innerText = "iPad didn't pick up audio. Check Mic permissions!";
                    }
                    
                    mainBtn.disabled = false;
                    mainBtn.innerText = "START TALKING";
                    mainBtn.className = "w-full py-10 rounded-[40px] font-bold text-2xl btn-ready";
                    micStatus.innerText = "OFF";
                    micStatus.className = "text-gray-700";
                }, 500);
            }
        };

        setup();
    </script>
</body>
</html>
