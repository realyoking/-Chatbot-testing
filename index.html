<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini 2026 - Gemma 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // 2026 Update: Gemma 3 1B is the most efficient model for mobile/tablets
        const modelId = "gemma-3-1b-it-q4f16_1-MLC"; 
        let engine;

        async function init() {
            const status = document.getElementById('status');
            const progress = document.getElementById('progress-bar');
            
            try {
                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (report) => {
                        status.innerText = report.text;
                        progress.style.width = `${report.progress * 100}%`;
                        if (report.progress >= 1) {
                            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                        }
                    }
                });
            } catch (e) {
                status.innerText = "WebGPU failed. Use a 2025+ Browser.";
            }
        }

        window.handleSend = async () => {
            const input = document.getElementById('promptInput');
            const text = input.value.trim();
            if (!text || !engine) return;

            document.getElementById('welcome-screen').style.display = 'none';
            appendMsg('user', text);
            input.value = '';
            
            const aiDisplay = appendMsg('ai', 'Thinking...');
            
            const chunks = await engine.chat.completions.create({
                messages: [{ role: "user", content: text }],
                stream: true,
            });

            let response = "";
            for await (const chunk of chunks) {
                response += chunk.choices[0]?.delta?.content || "";
                aiDisplay.innerText = response;
                window.scrollTo(0, document.body.scrollHeight);
            }
        };

        function appendMsg(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `mb-6 ${role === 'user' ? 'text-right' : 'text-left'}`;
            div.innerHTML = `
                <div class="inline-block p-4 rounded-2xl ${role === 'user' ? 'bg-[#2f2f2f]' : 'bg-transparent text-[#e3e3e3]'} max-w-[90%]">
                    ${role === 'ai' ? '<div class="text-blue-400 font-bold mb-2">✦</div>' : ''}
                    <div class="content">${text}</div>
                </div>`;
            container.appendChild(div);
            return div.querySelector('.content');
        }

        init();
    </script>
    <style>
        body { background: #131314; color: #e3e3e3; font-family: sans-serif; }
        .gemini-glow {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: move 4s linear infinite; background-size: 200%;
        }
        @keyframes move { from { background-position: 0%; } to { background-position: 200%; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader" class="fixed inset-0 z-50 bg-[#131314] flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent animate-spin rounded-full mb-4"></div>
        <p id="status" class="text-xs text-gray-500">Loading Gemma 3...</p>
        <div class="w-32 h-1 bg-gray-800 mt-4"><div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all"></div></div>
    </div>

    <header class="p-4 flex justify-between border-b border-white/5 bg-[#131314]/50 backdrop-blur-xl">
        <h1 class="font-medium text-lg">Gemini <span class="text-[10px] opacity-50">2026 Edition</span></h1>
        <button onclick="document.getElementById('set-mod').style.display='flex'"><i data-lucide="settings"></i></button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-6">
        <div id="welcome-screen" class="h-full flex flex-col justify-center">
            <h2 class="text-4xl font-medium mb-2"><span class="gemini-glow">Gemma 3 Active</span></h2>
            <p class="text-gray-500">Optimized for iPad Neural Engine.</p>
        </div>
    </main>

    <div class="p-4">
        <div class="max-w-3xl mx-auto flex items-center gap-2 bg-[#1e1f20] p-2 rounded-2xl border border-white/10">
            <input id="promptInput" type="text" placeholder="Message Gemini..." class="flex-1 bg-transparent p-2 outline-none">
            <button onclick="handleSend()" class="p-3 bg-white text-black rounded-xl hover:scale-95 transition-transform">
                <i data-lucide="arrow-up"></i>
            </button>
        </div>
    </div>

    <div id="set-mod" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-[100]">
        <div class="bg-[#1e1f20] w-full max-w-sm rounded-3xl p-6 border border-white/10">
            <h3 class="text-xl mb-4">System Settings</h3>
            <div class="space-y-4">
                <div class="flex justify-between"><span>Core Model</span><span class="text-blue-400">Gemma 3 1B</span></div>
                <div class="flex justify-between"><span>Engine</span><span class="text-green-400">WebGPU / NPU</span></div>
            </div>
            <button onclick="document.getElementById('set-mod').style.display='none'" class="w-full mt-6 py-3 bg-white text-black rounded-full">Close</button>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
