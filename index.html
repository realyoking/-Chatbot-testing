<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad AI - Permission Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0b; color: #00ff41; font-family: monospace; touch-action: manipulation; }
        #mainBtn { border: 3px solid #00ff41; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .recording { background: #ff1111 !important; border-color: #ff1111 !important; color: white !important; }
        #indicator { width: 12px; height: 12px; background: #333; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .mic-on { background: #ff1111 !important; box-shadow: 0 0 10px #ff1111; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="app" class="w-full max-w-sm text-center">
        <div class="mb-8">
            <div id="indicator"></div>
            <span id="statusText" class="text-[10px] uppercase tracking-widest text-gray-500">System Ready</span>
        </div>

        <div id="preview" class="p-8 mb-10 bg-gray-900 rounded-3xl text-white italic min-h-[100px] flex items-center justify-center">
            Tap the button to grant permission and start.
        </div>

        <button id="mainBtn" onclick="handleInteraction()" class="w-full py-12 rounded-[50px] font-bold text-2xl text-green-400 bg-transparent">
            ENABLE MIC
        </button>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        const preview = document.getElementById('preview');
        const mainBtn = document.getElementById('mainBtn');
        const indicator = document.getElementById('indicator');
        const statusText = document.getElementById('statusText');

        let generator;
        let recognition;
        let isRecording = false;
        let hasPermission = false;

        // 1. Force the Microphone Permission
        async function requestMicAccess() {
            try {
                // This is the "magic" line that triggers the iPad popup
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Stop the stream immediately, we just needed the permission
                stream.getTracks().forEach(track => track.stop());
                hasPermission = true;
                return true;
            } catch (e) {
                preview.innerText = "Permission Denied. Please enable the mic in iPad Settings > Safari.";
                return false;
            }
        }

        // 2. Load the AI
        (async () => {
            statusText.innerText = "Loading AI...";
            generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M');
            statusText.innerText = "AI Ready";
            setupSpeech();
        })();

        function setupSpeech() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let text = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                preview.innerText = text;
            };
        }

        window.handleInteraction = async () => {
            // First time click: Request Permission
            if (!hasPermission) {
                const granted = await requestMicAccess();
                if (granted) {
                    mainBtn.innerText = "START TALKING";
                    preview.innerText = "Permission Granted! Tap again to speak.";
                }
                return;
            }

            // Normal Toggle Logic
            if (!isRecording) {
                isRecording = true;
                preview.innerText = "Listening...";
                mainBtn.innerText = "TAP TO FINISH";
                mainBtn.classList.add('recording');
                indicator.classList.add('mic-on');
                
                window.speechSynthesis.cancel();
                recognition.start();
            } else {
                isRecording = false;
                recognition.stop();
                mainBtn.innerText = "THINKING...";
                mainBtn.classList.remove('recording');
                indicator.classList.remove('mic-on');

                setTimeout(async () => {
                    const input = preview.innerText;
                    if (input && input !== "Listening...") {
                        const output = await generator(input, { max_new_tokens: 50 });
                        const aiMsg = output[0].generated_text;
                        preview.innerText = aiMsg;
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance(aiMsg));
                    }
                    mainBtn.innerText = "START TALKING";
                }, 500);
            }
        };
    </script>
</body>
</html>
